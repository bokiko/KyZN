name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for KyZN? Describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you're running into
      placeholder: "I often need to X but currently KyZN only does Y..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Measurement / scoring
        - Analysis pipeline
        - Fix pipeline
        - Safety / security
        - New language support
        - CLI / UX
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, examples, related issues
    validations:
      required: false
